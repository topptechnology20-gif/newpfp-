    <!-- Inject lightweight theme toggle for preview/debug (uses existing CSS rules) -->
    <button
      class="tb-theme-btn"
      id="theme-toggle-btn"
      title="Toggle light/dark mode"
      style="position:fixed;right:12px;top:12px;z-index:9999;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.45);color:#fff;"
      onclick="(function(){window.toggleTheme&&window.toggleTheme();})()"
    >
      🌙
    </button>

    <script>
      (function(){
        // Apply theme based on localStorage; mirror the simple logic used elsewhere
        function applyTheme(isLight){
          var root = document.documentElement;
          if(isLight) root.classList.add('light'); else root.classList.remove('light');
          var btn = document.getElementById('theme-toggle-btn');
          if(btn) btn.textContent = isLight ? '☀️' : '🌙';
        }

        var saved = localStorage.getItem('mk-theme');
        var isLight = saved === 'light';
        applyTheme(isLight);

        window.toggleTheme = function(){
          isLight = !isLight;
          applyTheme(isLight);
          localStorage.setItem('mk-theme', isLight ? 'light' : 'dark');
        };
      })();
    </script>

    <script>
      (function(){
        var active = 'arena';
        function hideAll(){
          ['leaderboard','fighters','create'].forEach(function(id){
            var el = document.getElementById(id); if(el) el.classList.remove('active');
          });
        }
        window.showSection = function(name){
          if(name === 'arena'){
            hideAll();
            active = 'arena';
            return;
          }
          hideAll();
          var el = document.getElementById(name);
          if(el){ el.classList.add('active'); active = name; }
        };
        // expose a small helper to toggle by hash
        window.addEventListener('hashchange', function(){ var h = location.hash.replace('#',''); if(h) window.showSection(h); });
      })();
    </script>
    <script>

    <script>
      // Replace top nav page links with preview section buttons.
      (function(){
        var sectionMap = {
          'Bantah Arena': 'arena',
          'Agents': 'fighters',
          '⚔️ Create': 'arena',
          'Marketplace': 'arena',
          'Leaderboard': 'leaderboard',
          'New PFP': 'arena'
        };
        var removeHrefs = [
          '../index.html',
          '../index.html?page=agents',
          '../index.html?page=create',
          '../index.html?page=marketplace',
          '../index.html?page=leaderboard',
          '#'
        ];
        var removeText = new RegExp('^(' + Object.keys(sectionMap).map(function(label){ return label.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&'); }).join('|') + ')$', 'i');

        function buildButton(label, section){
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'tb-nav-item';
          btn.textContent = label;
          btn.style.cursor = 'pointer';
          btn.onclick = function(){ window.showSection(section); };
          return btn;
        }

        function interceptAnchor(anchor){
          if(!anchor) return false;
          var href = anchor.getAttribute('href') || '';
          var text = (anchor.textContent || '').trim();
          var section = sectionMap[text];
          if(removeHrefs.includes(href) || section){
            window.showSection(section || 'arena');
            return true;
          }
          if(/index\.html\?page=/.test(href)){
            window.showSection('arena');
            return true;
          }
          return false;
        }

        function installNavInterceptor(nav){
          if(nav.__previewIntercepted) return;
          nav.__previewIntercepted = true;
          nav.addEventListener('click', function(event){
            var anchor = event.target.closest('a');
            if(!anchor || !nav.contains(anchor)) return;
            if(interceptAnchor(anchor)){
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);
        }

        document.addEventListener('click', function(event){
          var anchor = event.target.closest('a');
          if(!anchor) return;
          if(interceptAnchor(anchor)){
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        function replaceNavItems(){
          var nav = document.getElementById('tb-nav');
          if(!nav) return;

          var removed = false;
          nav.querySelectorAll('a').forEach(function(a){
            var href = a.getAttribute('href') || '';
            var text = (a.textContent || '').trim();
            if(removeHrefs.includes(href) || removeText.test(text)){
              a.remove();
              removed = true;
            }
          });

          if(!nav.querySelector('[data-preview-section]')){
            if(removed){
              nav.appendChild(buildButton('Arena', 'arena'));
              nav.appendChild(buildButton('Leaderboard', 'leaderboard'));
              nav.appendChild(buildButton('Fighters', 'fighters'));
              nav.querySelectorAll('button').forEach(function(btn){
                btn.setAttribute('data-preview-section', 'true');
              });
            }
          }

          installNavInterceptor(nav);
        }

        document.addEventListener('DOMContentLoaded', replaceNavItems);
        var tries = 0;
        var interval = setInterval(function(){
          replaceNavItems();
          tries += 1;
          if(tries > 50) clearInterval(interval);
        }, 200);

        var observer = new MutationObserver(function(){ replaceNavItems(); });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
